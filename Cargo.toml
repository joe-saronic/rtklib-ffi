[package]
name = "rtklib-ffi"
description = "Rust wrapper for RTKLIB"
version = "0.1.3"
edition = "2018"
authors = ["Kevin Webb", "Joseph Fox-Rabinovitz"]
repository = "https://github.com/kpwebb/rtklib-ffi"
license = "MIT"
keywords = ["rtk", "rtklib", "gnss",]
homepage = "https://github.com/kpwebb/rtklib-ffi"
exclude = [
    ".gitignore",
    "test/**/*",
]

[workspace]
members = ["rtklib-sys"]

[features]
conv = ["rtklib-sys/conv"]
gis = ["rtklib-sys/gis"]
net = ["rtklib-sys/net"]
ppk = ["rtklib-sys/ppk"]
raw = ["rtklib-sys/raw"]
rtcm = ["rtklib-sys/rtcm"]
tle = ["rtklib-sys/tle"]

[dependencies]
bitflags = "2"
rtklib-sys = { path = "rtklib-sys/", version = "0.1.3" }
thiserror = "2"
